<html lang="es">
<head>

<style>
  :root {
    --green: #2D9E6B;
    --green-light: #4ECBA0;
    --yellow: #F5C842;
    --pink: #E8457A;
    --teal: #1B8FA8;
    --orange: #F07D3A;
    --dark: #0F1E1A;
    --card: #162920;
    --text: #E8F5F0;
    --muted: #7FB49A;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(45,158,107,0.12) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(27,143,168,0.10) 0%, transparent 50%),
      radial-gradient(ellipse at 60% 80%, rgba(232,69,122,0.07) 0%, transparent 50%);
    pointer-events: none; z-index: 0;
  }

  #loading-screen {
    position: fixed; inset: 0;
    background: var(--dark);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 999; gap: 16px;
  }

  .loading-emoji { font-size: 3rem; animation: float 1.5s ease-in-out infinite; }
  .loading-text { color: var(--muted); font-size: 0.9rem; }
  .spinner {
    width: 32px; height: 32px;
    border: 3px solid rgba(78,203,160,0.2);
    border-top-color: var(--green-light);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  #name-modal {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.75);
    display: none; align-items: center;
    justify-content: center;
    z-index: 998; padding: 24px;
  }

  .modal-box {
    background: var(--card);
    border-radius: 20px;
    padding: 28px 24px;
    width: 100%; max-width: 340px;
    border: 1px solid rgba(78,203,160,0.2);
    text-align: center;
  }

  .modal-box h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem; color: var(--green-light);
    margin-bottom: 8px;
  }

  .modal-box p { color: var(--muted); font-size: 0.85rem; margin-bottom: 20px; line-height: 1.5; }

  .modal-input {
    width: 100%;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 12px; color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem; padding: 12px 16px;
    margin-bottom: 14px; text-align: center;
  }
  .modal-input:focus { outline: none; border-color: var(--green-light); }

  .modal-btn {
    width: 100%;
    background: linear-gradient(135deg, var(--green), var(--teal));
    border: none; border-radius: 12px;
    color: white; font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem; font-weight: 600;
    padding: 13px; cursor: pointer;
  }

  .container {
    max-width: 480px; margin: 0 auto;
    padding: 0 16px 100px;
    position: relative; z-index: 1;
  }

  /* HERO */
  .hero { text-align: center; padding: 36px 0 24px; }

  .hero-flag {
    font-size: 52px; display: block;
    margin-bottom: 10px;
    animation: float 3s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  .hero h1 {
    font-family: 'Playfair Display', serif;
    font-size: 2.6rem; font-weight: 900; line-height: 1.1;
    background: linear-gradient(135deg, var(--green-light), var(--yellow), var(--pink));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .hero-sub {
    color: var(--muted); font-size: 0.82rem;
    margin-top: 8px; letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .user-chip {
    display: inline-block;
    background: rgba(78,203,160,0.12);
    border: 1px solid rgba(78,203,160,0.25);
    border-radius: 100px;
    padding: 5px 16px; font-size: 0.78rem;
    color: var(--green-light);
    margin-top: 12px; cursor: pointer;
  }

  /* DAY CARDS */
  .day-card {
    background: var(--card); border-radius: 20px;
    margin: 12px 0; overflow: hidden;
    border: 1px solid rgba(255,255,255,0.06);
    transition: transform 0.15s;
  }

  .day-header {
    display: flex; align-items: center;
    gap: 14px; padding: 18px 20px;
    cursor: pointer; user-select: none;
  }

  .day-num {
    font-family: 'Playfair Display', serif;
    font-size: 2.4rem; font-weight: 900;
    line-height: 1; min-width: 52px;
  }

  .day-info { flex: 1; }
  .day-weekday { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.08em; opacity: 0.55; margin-bottom: 3px; }
  .day-title { font-size: 0.93rem; font-weight: 600; line-height: 1.3; }
  .day-badge { font-size: 1.5rem; }
  .day-chevron { font-size: 0.8rem; color: var(--muted); transition: transform 0.3s; }
  .day-card.open .day-chevron { transform: rotate(180deg); }

  .day-accent {
    height: 3px;
    margin: 0 20px 0;
  }

  .day-body { display: none; padding: 14px 20px 20px; }
  .day-card.open .day-body { display: block; }

  /* Activity list — purely informational */
  .activity-list { display: flex; flex-direction: column; gap: 2px; margin-bottom: 4px; }

  .activity-row {
    display: flex; align-items: flex-start;
    gap: 10px; padding: 9px 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .activity-row:last-child { border-bottom: none; }

  .activity-icon { font-size: 1.1rem; flex-shrink: 0; margin-top: 1px; }

  .activity-text { font-size: 0.88rem; line-height: 1.4; color: var(--text); flex: 1; }

  .activity-tag {
    display: inline-block; font-size: 0.63rem;
    padding: 2px 7px; border-radius: 100px;
    margin-left: 6px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.04em;
    vertical-align: middle; flex-shrink: 0;
  }
  .tag-intense { background: rgba(232,69,122,0.18); color: var(--pink); }
  .tag-food    { background: rgba(245,200,66,0.18); color: var(--yellow); }
  .tag-relax   { background: rgba(45,158,107,0.18); color: var(--green-light); }
  .tag-transport { background: rgba(27,143,168,0.18); color: #6DD5ED; }

  /* LINKS SECTION */
  .links-section {
    margin-top: 18px;
    border-top: 1px solid rgba(255,255,255,0.07);
    padding-top: 16px;
  }

  .links-label {
    font-size: 0.75rem; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.06em;
    margin-bottom: 12px;
  }

  .link-desc-input {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px; color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem; padding: 9px 12px;
    margin-bottom: 7px;
  }
  .link-desc-input:focus { outline: none; border-color: rgba(78,203,160,0.4); }
  .link-desc-input::placeholder { color: rgba(255,255,255,0.18); }

  .photo-link-row { display: flex; gap: 8px; margin-bottom: 6px; }

  .photo-link-input {
    flex: 1;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px; color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem; padding: 9px 12px;
  }
  .photo-link-input:focus { outline: none; border-color: var(--teal); }
  .photo-link-input::placeholder { color: rgba(255,255,255,0.2); }

  .btn-add-link {
    background: rgba(27,143,168,0.2);
    border: 1px solid rgba(27,143,168,0.3);
    color: #6DD5ED; border-radius: 10px;
    padding: 9px 14px; font-size: 0.82rem;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer; white-space: nowrap;
    transition: background 0.2s;
  }
  .btn-add-link:hover { background: rgba(27,143,168,0.4); }
  .btn-add-link:disabled { opacity: 0.5; cursor: not-allowed; }

  .add-status {
    font-size: 0.75rem; text-align: center;
    min-height: 18px; transition: opacity 0.3s;
    color: var(--green-light); margin-bottom: 10px;
    opacity: 0;
  }

  .saved-links { display: flex; flex-direction: column; gap: 8px; }

  .saved-link-item {
    background: rgba(255,255,255,0.04);
    border-radius: 10px; padding: 10px 12px;
  }

  .link-item-top {
    display: flex; align-items: center;
    gap: 8px; margin-bottom: 3px;
  }

  .link-item-author {
    font-size: 0.72rem; font-weight: 600;
    color: var(--green-light); flex-shrink: 0;
  }

  .link-item-url {
    flex: 1; color: #6DD5ED;
    font-size: 0.8rem; text-decoration: none;
    overflow: hidden; text-overflow: ellipsis;
    white-space: nowrap;
  }
  .link-item-url:hover { text-decoration: underline; }

  .btn-del-link {
    background: none; border: none;
    color: rgba(255,255,255,0.25);
    cursor: pointer; font-size: 0.85rem;
    padding: 2px; transition: color 0.2s; flex-shrink: 0;
  }
  .btn-del-link:hover { color: var(--pink); }

  .link-item-desc { font-size: 0.75rem; color: var(--muted); }

  .links-empty { color: var(--muted); font-size: 0.8rem; font-style: italic; }

  /* GALLERY TAB */
  .gallery-header { padding: 32px 0 16px; text-align: center; }
  .gallery-header h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.9rem; color: var(--yellow); margin-bottom: 6px;
  }
  .gallery-header p { color: var(--muted); font-size: 0.85rem; }

  .gallery-day-group {
    background: var(--card); border-radius: 16px;
    padding: 14px 16px; margin-bottom: 12px;
    border: 1px solid rgba(255,255,255,0.06);
  }

  .gallery-day-title {
    font-size: 0.82rem; font-weight: 600;
    margin-bottom: 10px;
    display: flex; align-items: center; gap: 6px;
  }

  /* BOTTOM NAV */
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: rgba(15,30,26,0.96);
    backdrop-filter: blur(20px);
    border-top: 1px solid rgba(255,255,255,0.08);
    display: flex; padding: 10px 0 20px; z-index: 100;
  }

  .nav-btn {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; gap: 3px;
    background: none; border: none;
    cursor: pointer; color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.65rem; padding: 4px;
    transition: color 0.2s;
  }
  .nav-btn.active { color: var(--green-light); }
  .nav-btn span:first-child { font-size: 1.3rem; }

  .tab-content { display: none; }
  .tab-content.active { display: block; }

  .sync-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--green-light); display: inline-block;
    margin-right: 5px;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
</style>
</head>
<body>

<div id="loading-screen">
  <span class="loading-emoji">🌴</span>
  <div class="spinner"></div>
  <div class="loading-text">Conectando...</div>
</div>

<div id="name-modal">
  <div class="modal-box">

    <input class="modal-input" id="name-input" placeholder="Tu nombre o apodo" maxlength="30" />
    <button class="modal-btn" onclick="submitName()">Entrar al viaje 🌴</button>

<div class="container">

  <!-- TAB: ITINERARIO -->

  </button>
  <button class="nav-btn" id="nav-gallery" onclick="switchTab('gallery')">
    <span>📸</span><span>Fotos & Videos</span>

</div>

<script>
const DAYS = [
  { id:'mar15', num:15, weekday:'Miércoles', title:'Llegada · Waterfall Gardens · Hot Springs', emoji:'✈️', color:'#2D9E6B',
    activities:[
      {icon:'✈️', text:'Vuelo de Tampico a Costa Rica', tag:'transport'},
      {icon:'🌿', text:'Traslado a Waterfall Gardens La Paz', tag:'transport'},

      {icon:'🚌', text:'Traslado a La Fortuna', tag:'transport'},
      {icon:'💦', text:'Parque acuático Hot Springs "Baldí"', tag:'relax'},
      {icon:'🍴', text:'Cena en Baldí', tag:'food'},
      {icon:'🏨', text:'Check in — Arenal Hot Springs Resort', tag:null},
    ]
  },
  { id:'jue16', num:16, weekday:'Jueves', title:'Maquique · Catarata La Fortuna · Termales', emoji:'🧗', color:'#E8457A',
    activities:[
      {icon:'🍳', text:'Desayuno buffet', tag:'food'},
      {icon:'🧗', text:'Maquique: Rappel en cascada', tag:'intense'},
      {icon:'🥾', text:'Caminata técnica entre rocas y agua', tag:'intense'},
      {icon:'🍽️', text:'Comida en Maquique', tag:'food'},
      {icon:'💦', text:'Catarata de La Fortuna (500 escalones)', tag:'intense'},
      {icon:'♨️', text:'Tiempo libre en aguas termales del hotel', tag:'relax'},
      {icon:'🍴', text:'Cena buffet hotel Arenal', tag:'food'},
    ]
  },
  { id:'vie17', num:17, weekday:'Viernes', title:'Lago Arenal · Traslado a Monteverde', emoji:'🚤', color:'#1B8FA8',
    activities:[
      {icon:'🍳', text:'Desayuno buffet', tag:'food'},
      {icon:'🚤', text:'Traslado al embarque del Lago Arenal', tag:'transport'},
      {icon:'⛵', text:'Viaje en lancha hacia Monteverde', tag:null},
      {icon:'🚌', text:'Bus a Santa Elena / Monteverde', tag:'transport'},
      {icon:'🍝', text:'Comida en restaurante italiano', tag:'food'},
      {icon:'🏨', text:'Check in — Hotel El Establo', tag:null},
      {icon:'🌙', text:'Night walk (selva nocturna)', tag:null},
      {icon:'🍴', text:'Cena en Hotel El Establo', tag:'food'},
    ]
  },
  { id:'sab18', num:18, weekday:'Sábado', title:'Treetopia · Canopy · Puentes Colgantes', emoji:'🤸', color:'#F07D3A',
    activities:[
      {icon:'🍳', text:'Desayuno buffet', tag:'food'},
      {icon:'🏋️', text:'Treetopia Park: Challenge Course', tag:'intense'},
      {icon:'🚡', text:'Skytram (teleférico del bosque)', tag:null},
      {icon:'🪂', text:'Zip line / Canopy', tag:'intense'},
      {icon:'🍽️', text:'Comida', tag:'food'},
      {icon:'🌉', text:'Puentes colgantes', tag:null},
      {icon:'🏨', text:'Tiempo libre en Hotel El Establo', tag:'relax'},
      {icon:'🍴', text:'Cena en El Establo', tag:'food'},
    ]
  },
  { id:'dom19', num:19, weekday:'Domingo', title:'Tour del café · San José · Mestizo', emoji:'☕', color:'#F5C842',
    activities:[
      {icon:'🍳', text:'Desayuno', tag:'food'},
      {icon:'🏨', text:'Check out', tag:null},
      {icon:'☕', text:'Tour del café El Trapiche', tag:null},
      {icon:'🛍️', text:'Tiempo libre en el centro del pueblo', tag:null},
      {icon:'🍽️', text:'Comida (no incluida)', tag:'food'},
      {icon:'🚌', text:'Traslado a San José', tag:'transport'},
      {icon:'🏨', text:'Check in hotel San José', tag:null},
      {icon:'🍜', text:'Cena en Mestizo (mercado gastronómico)', tag:'food'},
    ]
  },
  { id:'lun20', num:20, weekday:'Lunes', title:'Regreso a casa 🏠', emoji:'✈️', color:'#4ECBA0',
    activities:[
      {icon:'🍳', text:'Desayuno', tag:'food'},
      {icon:'🏨', text:'Check out', tag:null},
      {icon:'🚌', text:'Traslado al aeropuerto', tag:'transport'},
      {icon:'✈️', text:'Vuelo de regreso', tag:'transport'},
    ]
  }
];

const tagLabels = { intense:'💪 Intenso', food:'🍽️ Comida', relax:'♨️ Relax', transport:'🚌 Traslado' };

let userName = localStorage.getItem('crATS_name') || '';
let firestoreLinks = {};

function db() { return window._db; }

function escHtml(str) {
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function ensureDayDoc(dayId) {
  const ref = window._doc(db(), 'trips', 'costarica2026', 'days', dayId);
  const snap = await window._getDoc(ref);
  if (!snap.exists()) await window._setDoc(ref, { links: [] });
  return ref;
}

function subscribeDay(dayId) {
  const ref = window._doc(db(), 'trips', 'costarica2026', 'days', dayId);
  window._onSnapshot(ref, snap => {
    if (snap.exists()) {
      firestoreLinks[dayId] = snap.data().links || [];
      refreshLinksUI(dayId);
      if (document.getElementById('tab-gallery').classList.contains('active')) renderGallery();
    }
  });
}

function submitName() {
  const input = document.getElementById('name-input');
  const name = input.value.trim();
  if (!name) { input.focus(); return; }
  userName = name;
  localStorage.setItem('crATS_name', name);
  document.getElementById('name-modal').style.display = 'none';
  document.getElementById('user-chip').textContent = '👤 ' + name;
}

function changeName() {
  document.getElementById('name-input').value = userName;
  document.getElementById('name-modal').style.display = 'flex';
}

function renderLinksHTML(dayId, links) {
  if (!links || !links.length) return '<div class="links-empty">Sin links todavía — ¡sé el primero! 📸</div>';
  return links.map((l, i) => `
    <div class="saved-link-item">
      <div class="link-item-top">
        <span class="link-item-author">👤 ${escHtml(l.author||'Anónimo')}</span>
        <a class="link-item-url" href="${escHtml(l.url)}" target="_blank">${escHtml(l.url)}</a>
        <button class="btn-del-link" onclick="deleteLink('${dayId}',${i})" title="Eliminar">✕</button>
      </div>
      ${l.desc ? `<div class="link-item-desc">📌 ${escHtml(l.desc)}</div>` : ''}
    </div>
  `).join('');
}

function refreshLinksUI(dayId) {
  const el = document.getElementById('links-' + dayId);
  if (el) el.innerHTML = renderLinksHTML(dayId, firestoreLinks[dayId] || []);
}

function renderDays() {
  const container = document.getElementById('days-container');
  container.innerHTML = '';

  DAYS.forEach(day => {
    const card = document.createElement('div');
    card.className = 'day-card';
    card.id = 'card-' + day.id;

    const activitiesHTML = day.activities.map(a => `
      <div class="activity-row">
        <span class="activity-icon">${a.icon}</span>
        <span class="activity-text">${a.text}${a.tag ? `<span class="activity-tag tag-${a.tag}">${tagLabels[a.tag]}</span>` : ''}</span>
      </div>
    `).join('');

    const links = firestoreLinks[day.id] || [];

    card.innerHTML = `
      <div class="day-header" onclick="toggleCard('${day.id}')">
        <span class="day-num" style="color:${day.color}">${day.num}</span>
        <div class="day-info">
          <div class="day-weekday">${day.weekday} · Abril</div>
          <div class="day-title">${day.title}</div>
        </div>
        <span class="day-badge">${day.emoji}</span>
        <span class="day-chevron">▼</span>
      </div>
      <div class="day-accent" style="background:linear-gradient(90deg,${day.color},transparent)"></div>
      <div class="day-body">
        <div class="activity-list">${activitiesHTML}</div>

        <div class="links-section">
          <div class="links-label"><span class="sync-dot"></span>Fotos & Videos — compartido con todos</div>
          <input class="link-desc-input" id="desc-${day.id}" placeholder="Descripción (ej: Rappel en Maquique 🧗)" />
          <div class="photo-link-row">
            <input class="photo-link-input" id="linkinput-${day.id}" placeholder="Link de Drive, YouTube, TikTok..." />
            <button class="btn-add-link" id="addbtn-${day.id}" onclick="addLink('${day.id}')">📎 Subir</button>
          </div>
          <div class="add-status" id="addstatus-${day.id}"></div>
          <div class="saved-links" id="links-${day.id}">${renderLinksHTML(day.id, links)}</div>
        </div>
      </div>
    `;
    container.appendChild(card);
  });
}

function toggleCard(dayId) {
  document.getElementById('card-' + dayId).classList.toggle('open');
}

async function addLink(dayId) {
  if (!userName) { document.getElementById('name-modal').style.display = 'flex'; return; }
  const urlInput = document.getElementById('linkinput-' + dayId);
  const descInput = document.getElementById('desc-' + dayId);
  const btn = document.getElementById('addbtn-' + dayId);
  const status = document.getElementById('addstatus-' + dayId);
  const url = urlInput.value.trim();
  if (!url) { urlInput.focus(); return; }

  btn.disabled = true;
  status.textContent = 'Guardando...';
  status.style.opacity = '1';

  try {
    await ensureDayDoc(dayId);
    await window._updateDoc(
      window._doc(db(), 'trips', 'costarica2026', 'days', dayId),
      { links: window._arrayUnion({ url, desc: descInput.value.trim(), author: userName, ts: Date.now() }) }
    );
    urlInput.value = '';
    descInput.value = '';
    status.textContent = '✓ ¡Compartido con todos!';
    setTimeout(() => { status.style.opacity = '0'; }, 2500);
  } catch(e) {
    status.textContent = '❌ Error — revisa tu conexión';
    status.style.opacity = '1';
    console.error(e);
  }
  btn.disabled = false;
}

async function deleteLink(dayId, idx) {
  const links = firestoreLinks[dayId] || [];
  const linkObj = links[idx];
  if (!linkObj) return;
  if (linkObj.author !== userName) {
    alert('Solo puedes eliminar tus propios links 😊');
    return;
  }
  try {
    await window._updateDoc(
      window._doc(db(), 'trips', 'costarica2026', 'days', dayId),
      { links: window._arrayRemove(linkObj) }
    );
  } catch(e) { console.error(e); }
}

function renderGallery() {
  const container = document.getElementById('all-links-container');
  container.innerHTML = '';
  DAYS.forEach(day => {
    const links = firestoreLinks[day.id] || [];
    const group = document.createElement('div');
    group.className = 'gallery-day-group';
    group.innerHTML = `
      <div class="gallery-day-title" style="color:${day.color}">${day.emoji} ${day.weekday} ${day.num} — ${day.title}</div>
      ${!links.length
        ? '<div class="links-empty">Sin links todavía</div>'
        : links.map(l => `
            <div class="saved-link-item" style="margin-bottom:7px">
              <div class="link-item-top">
                <span class="link-item-author">👤 ${escHtml(l.author||'Anónimo')}</span>
                <a class="link-item-url" href="${escHtml(l.url)}" target="_blank">${escHtml(l.url)}</a>
              </div>
              ${l.desc ? `<div class="link-item-desc">📌 ${escHtml(l.desc)}</div>` : ''}
            </div>
          `).join('')
      }
    `;
    container.appendChild(group);
  });
}

function switchTab(tab) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  document.getElementById('nav-' + tab).classList.add('active');
  if (tab === 'gallery') renderGallery();
}

window.addEventListener('firebaseReady', async () => {
  document.getElementById('loading-screen').style.display = 'none';

  for (const day of DAYS) {
    await ensureDayDoc(day.id);
    subscribeDay(day.id);
  }

  renderDays();

  if (!userName) {
    document.getElementById('name-modal').style.display = 'flex';
  } else {
    document.getElementById('user-chip').textContent = '👤 ' + userName;
  }

  document.getElementById('name-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') submitName();
  });
});
</script>
</body>
</html>
